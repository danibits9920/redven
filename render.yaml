# Blueprint de Render: define la base de datos, el backend y el frontend.
# En Render: New + -> Blueprint -> selecciona este repositorio.
#
# NOTA: el plan free de PostgreSQL en Render caduca a los 90 dias. Para algo
# permanente, cambia luego DATABASE_URL por una base de Neon (gratis y duradera)
# sin tocar el codigo.

databases:
  - name: redacopio-db
    databaseName: redacopio
    user: redacopio
    plan: free

services:
  # ---------------- Backend (API Node/Express/Prisma) ----------------
  - type: web
    name: redacopio-api
    runtime: node
    plan: free
    rootDir: backend
    # --include=dev instala typescript/prisma/tsx (necesarios para compilar);
    # migrate deploy crea las tablas; seed:admin asegura el usuario admin.
    buildCommand: "npm install --include=dev && npm run build && npx prisma migrate deploy && npm run seed:admin"
    startCommand: "npm start"
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: redacopio-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Render genera un secreto seguro automaticamente
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: NODE_ENV
        value: production
      # Se definen a mano al crear el Blueprint (Render los pedira):
      - key: CORS_ORIGIN
        sync: false # -> URL del frontend, ej: https://redacopio-web.onrender.com
      - key: ADMIN_EMAIL
        sync: false # -> email del administrador inicial
      - key: ADMIN_PASSWORD
        sync: false # -> contrasena del administrador inicial

  # ---------------- Frontend (React/Vite, sitio estatico) ----------------
  - type: web
    name: redacopio-web
    runtime: static
    rootDir: frontend
    buildCommand: "npm install --include=dev && npm run build"
    staticPublishPath: dist
    routes:
      # React Router: cualquier ruta cae en index.html (SPA)
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false # -> URL del backend + /api, ej: https://redacopio-api.onrender.com/api
